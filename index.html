<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZayinUp LLP - Transform Your Future</title>
  <link rel="icon" type="image/png"
    href="https://raw.githubusercontent.com/abhiraj6/icon/refs/heads/main/Copy%20of%201771699124529.png">

  <!-- Fonts: Outfit for pristine headers, Plus Jakarta Sans for premium body -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            // Sleek Dark Theme Colors
            primary: '#0f172a',      // Slate 900
            secondary: '#1e293b',    // Slate 800
            accent: '#3b82f6',       // Vibrant Blue
            'accent-glow': '#8b5cf6', // Purple Glow
          },
          fontFamily: {
            serif: ['Outfit', 'sans-serif'], // Replacing Playfair with Outfit for Headings
            sans: ['"Plus Jakarta Sans"', 'sans-serif'], // Body
          },
          animation: {
            'blob': 'blob 7s infinite',
            'float': 'float 6s ease-in-out infinite',
          },
          keyframes: {
            blob: {
              '0%': { transform: 'translate(0px, 0px) scale(1)' },
              '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
              '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
              '100%': { transform: 'translate(0px, 0px) scale(1)' },
            },
            float: {
              '0%, 100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(-10px)' },
            }
          }
        }
      }
    }
  </script>

  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>

  <!-- React Router DOM (v6) needs these specific scripts in UMD -->
  <script src="https://unpkg.com/@remix-run/router@1.21.0/dist/router.umd.min.js"></script>
  <script src="https://unpkg.com/react-router@6.28.0/dist/umd/react-router.development.js"></script>
  <script src="https://unpkg.com/react-router-dom@6.28.0/dist/umd/react-router-dom.development.js"></script>

  <!-- Babel for in-browser JSX compilation -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #0f172a;
    }
    ::-webkit-scrollbar-thumb {
      background: #334155;
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #475569;
    }

    /* Base Styling */
    body {
      margin: 0;
      padding: 0;
      background-color: #020617; /* Very deep blue/black */
      color: #f8fafc; /* Slate 50 */
    }

    ::selection {
      background-color: #3b82f6;
      color: white;
    }

    #root:empty::before {
      content: "Loading ZayinUp...";
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: 'Outfit', sans-serif;
      color: #3b82f6;
      font-weight: 600;
      font-size: 1.5rem;
      letter-spacing: 0.05em;
    }
  </style>
</head>

<body class="font-sans antialiased min-h-screen flex flex-col bg-[#020617] text-slate-200 selection:bg-accent selection:text-white relative overflow-x-hidden">
  <!-- Global background glows for modern dynamic look -->
  <div class="fixed inset-0 z-[-1] pointer-events-none overflow-hidden">
    <div class="absolute top-0 right-[-10%] w-[40rem] h-[40rem] bg-accent/10 rounded-full blur-[120px] mix-blend-screen animate-blob"></div>
    <div class="absolute top-[40%] left-[-10%] w-[35rem] h-[35rem] bg-purple-600/10 rounded-full blur-[120px] mix-blend-screen animate-blob animation-delay-2000"></div>
  </div>

  <div id="root" class="flex-grow flex flex-col relative z-10 w-full h-full"></div>

  <!-- Application Scripts in correct dependency order -->
  <script type="text/babel" src="src/services.js?v=1.3"></script>
  <script type="text/babel" src="src/components.js?v=1.3"></script>
  <script type="text/babel" src="src/pages/Home.js?v=1.3"></script>
  <script type="text/babel" src="src/pages/Openings.js?v=1.3"></script>
  <script type="text/babel" src="src/pages/Services.js?v=1.3"></script>
  <script type="text/babel" src="src/pages/Admission.js?v=1.3"></script>
  <script type="text/babel" src="src/pages/Contact.js?v=1.3"></script>
  <script type="text/babel" src="src/pages/Register.js?v=1.3"></script>
  <script type="text/babel" src="src/pages/Admin.js?v=1.3"></script>
  <script type="text/babel" src="src/App.js?v=1.3"></script>
</body>

</html>
